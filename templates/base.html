<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MovieWeb App{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">
                <a href="{{ url_for('index') }}" class="logo-link">
                    <img src="https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=80&auto=format&fit=crop&q=60" alt="App Logo" class="brand-logo-img">
                    <span>MovieWeb</span>
                </a>
            </div>
            <ul class="nav-links">
                <li><a href="{{ url_for('index') }}" class="nav-item">Home</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>&copy; 2026 MovieWeb App. Elevating Your Cinema Collection.</p>
    </footer>

</body>
</html>
